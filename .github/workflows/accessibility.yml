name: Accessibility Checks

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  accessibility:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-cache-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-cache-

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Run accessibility tests
        id: pa11y_axe
        run: npx start-server-and-test start http://localhost:3000 'pa11y-ci && axe http://localhost:3000 --exit --no-sandbox --disable-setuid-sandbox --disable-dev-shm-usage'
        continue-on-error: true
        env:
          PUPPETEER_ARGS: --no-sandbox --disable-setuid-sandbox --disable-dev-shm-usage
      - name: Run Lighthouse accessibility audit
        id: lighthouse
        run: npx start-server-and-test start http://localhost:3000 'npm run test:lighthouse'
        continue-on-error: true
        env:
          PUPPETEER_ARGS: --no-sandbox --disable-setuid-sandbox --disable-dev-shm-usage

      - name: Warn if Pa11y/Axe failed
        if: steps.pa11y_axe.outcome == 'failure'
        run: echo "::warning::Pa11y and Axe accessibility tests failed. Deployment proceeding, but review artifacts for details."

      - name: Warn if Lighthouse failed
        if: steps.lighthouse.outcome == 'failure'
        run: echo "::warning::Lighthouse accessibility audit failed. Deployment proceeding, but review artifacts for details."

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: .lighthouseci/

      - name: Upload Pa11y report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pa11y-report
          path: .pa11yci/