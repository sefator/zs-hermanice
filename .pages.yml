media:
  input: public/uploads
  output: /uploads

content:
  - name: home
    label: Domovská stránka
    type: file
    path: content/pages/home.md
    fields:
      - name: title
        label: Titulek
        type: string
        required: true
      - name: lead
        label: Úvodní text
        type: text
      - name: heroImage
        label: Hero fotografie
        type: image
      - name: cta
        label: CTA
        type: object
        fields:
          - name: label
            label: Text tlačítka
            type: string
          - name: link
            label: Odkaz
            type: string
      - name: sections
        label: Sekce
        type: object
        list: true
        fields:
          - name: heading
            label: Nadpis
            type: string
          - name: body
            label: Text
            type: text
      - name: quickLinks
        label: Rychlé odkazy
        type: object
        list: true
        fields:
          - name: title
            label: Titulek
            type: string
            required: true
          - name: link
            label: Odkaz
            type: string
            required: true
      - name: galleryTeasers
        label: Galerie – upoutávky
        type: object
        list: true
        fields:
          - name: title
            label: Titulek
            type: string
            required: true
          - name: date
            label: Datum
            type: date
            required: true
          - name: image
            label: Obrázek
            type: image
          - name: link
            label: Odkaz
            type: string
      - name: projects
        label: Projekty
        type: object
        list: true
        fields:
          - name: title
            label: Titulek
            type: string
            required: true
          - name: summary
            label: Perex
            type: text
          - name: image
            label: Obrázek
            type: image
      - name: testimonials
        label: Reference rodičů
        type: object
        list: true
        fields:
          - name: name
            label: Jméno
            type: string
            required: true
          - name: role
            label: Role
            type: string
            required: true
          - name: quote
            label: Citace
            type: text
            required: true
          - name: photo
            label: Fotografie
            type: image
            required: true
      - name: schoolImages
        label: Obrázky školy
        type: object
        list: true
        fields:
          - name: image
            label: Obrázek
            type: image
            required: true
          - name: alt
            label: Alternativní text
            type: string
            required: true
      - name: recentNews
        label: Aktuality
        type: object
        list: true
        fields:
          - name: title
            label: Titulek
            type: string
            required: true
          - name: date
            label: Datum
            type: date
            required: true
          - name: summary
            label: Perex
            type: text
          - name: image
            label: Obrázek
            type: image
          - name: link
            label: Odkaz
            type: string
      - name: sponsors
        label: Sponzoři
        type: object
        list: true
        fields:
          - name: name
            label: Jméno
            type: string
            required: true
          - name: logo
            label: Logo
            type: image
          - name: link
            label: Odkaz
            type: string
  - name: contact
    label: Kontakt
    type: collection
    path: content/pages/contact
    filename: "{slug}.md"
    fields:
      - name: title
        label: Titulek
        type: string
        required: true
      - name: slug
        label: Slug
        type: string
        required: true
      - name: body
        label: Obsah
        type: text
        required: true
    view:
      fields: [title, slug]
      sort: [title]
  - name: druzina
    label: Družina
    type: collection
    path: content/pages/druzina
    filename: "{slug}.md"
    fields:
      - name: title
        label: Titulek
        type: string
        required: true
      - name: downloads
        label: Soubory ke stažení
        type: object
        list: true
        fields:
          - name: label
            label: Popisek
            type: string
          - name: url
            label: Odkaz
            type: string
      - name: body
        label: Obsah
        type: text
        required: true
    view:
      fields: [title]
      sort: [title]
  - name: gallery
    label: Fotogalerie
    type: collection
    path: content/pages/gallery
    filename: "{year}-{month}.md"
    fields:
      - name: title
        label: Titulek
        type: string
        required: true
      - name: images
        label: Obrázky
        type: object
        list: true
        fields:
          - name: src
            label: Zdroj
            type: image
          - name: alt
            label: Alternativní text
            type: string
      - name: body
        label: Obsah
        type: text
        required: true
    view:
      fields: [title]
      sort: [title]
  - name: official
    label: Úřední deska
    type: collection
    path: content/pages/official
    filename: "{slug}.md"
    fields:
      - name: title
        label: Titulek
        type: string
        required: true
      - name: downloads
        label: Soubory ke stažení
        type: object
        list: true
        fields:
          - name: label
            label: Popisek
            type: string
          - name: url
            label: Odkaz
            type: string
      - name: body
        label: Obsah
        type: text
        required: true
    view:
      fields: [title]
      sort: [title]
  - name: school
    label: Škola
    type: collection
    path: content/pages/school
    filename: "{slug}.md"
    fields:
      - name: title
        label: Titulek
        type: string
        required: true
      - name: downloads
        label: Soubory ke stažení
        type: object
        list: true
        fields:
          - name: label
            label: Popisek
            type: string
          - name: url
            label: Odkaz
            type: string
      - name: body
        label: Obsah
        type: text
        required: true
    view:
      fields: [title]
      sort: [title]
  - name: news
    label: Aktuality
    type: collection
    path: content/news
    filename: "{year}-{month}-{day}-{slug}.md"
    fields:
      - name: title
        label: Titulek
        type: string
        required: true
      - name: date
        label: Datum
        type: date
        required: true
      - name: summary
        label: Perex
        type: text
      - name: coverImage
        label: Obrázek
        type: image
      - name: tags
        label: Štítky
        type: string
        list: true
      - name: body
        label: Obsah
        type: text
        required: true
    view:
      fields: [title, date]
      sort: [date, title]
      default:
        sort: date
        order: desc
